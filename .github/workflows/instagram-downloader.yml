name: instagram-downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Instagram URLs – separate by comma, space, or newline'
        required: true
        
permissions:
  contents: write

jobs:
  actions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ---------- setup Node.js 24 ----------
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ---------- extract URLs from input ----------
      - name: Parse input and extract URLs
        id: parse
        run: |
          INPUT="${{ github.event.inputs.urls }}"
          CLEANED=$(echo "$INPUT" | tr -d '"'\')
          URLS=$(echo "$CLEANED" | grep -oP 'https?://(www\.)?instagram\.com/[^\s,;]+' | sort -u)
          if [ -z "$URLS" ]; then
            echo "ERROR: No Instagram URLs found in the input."
            exit 1
          fi
          echo "$URLS" > urls.txt
          echo "Found $(wc -l < urls.txt) URL(s) to download."

      # ---------- write cookies from secrets ----------
      - name: Write cookies from secrets
        run: |
          if [ -n "$INSTAGRAM_COOKIES" ]; then
            echo "$INSTAGRAM_COOKIES" > instagram-cookies.txt
            echo "Instagram cookies written."
          else
            echo "No INSTAGRAM_COOKIES secret found – proceeding without login, may fail for private content."
          fi
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}

      # ---------- cache & install tools ----------
      - name: Restore cached tools
        uses: actions/cache@v4
        id: tool-cache
        with:
          path: |
            ~/.local/bin/yt-dlp
            ~/.deno
            ~/.cache/pip
          key: fetch-tools-${{ runner.os }}-v3

      - name: Add cached tools to PATH
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install tools
        run: |
          pip install yt-dlp gallery-dl

          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi

          if ! command -v jq &> /dev/null || ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq ffmpeg
          fi

          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
            echo "$HOME/.deno/bin" >> $GITHUB_PATH
          fi

      # ---------- download all Instagram URLs ----------
      - name: Download Instagram content
        run: |
          mkdir -p instagram_downloads

          GALLERY_DL_ARGS=""
          if [ -f "instagram-cookies.txt" ]; then
            GALLERY_DL_ARGS="$GALLERY_DL_ARGS --cookies instagram-cookies.txt"
          fi

          gallery-dl $GALLERY_DL_ARGS \
                     --input-file urls.txt \
                     -d "instagram_downloads" \
                     --verbose

          echo "Downloads finished. Contents:"
          ls -lhR instagram_downloads/

      # ---------- create split ZIP archive with unique random suffix ----------
      - name: Create ZIP archive (split into 99 MB parts, unique name)
        id: zip
        run: |
          mkdir -p instagram

          # Generate a unique 8-character suffix (no collision check needed)
          RANDSTR=$(uuidgen | tr '[:upper:]' '[:lower:]' | tr -d '-' | head -c 8)
          ZIP_NAME="instagram-contents-${RANDSTR}.zip"

          echo "Using archive base name: ${ZIP_NAME}"
          zip -j -s 99m -r "instagram/${ZIP_NAME}" instagram_downloads/

          echo "Created archive parts:"
          ls -lh instagram/

      # ---------- upload to repository ----------
      - name: Commit and push changes
        env:
          BRANCH: ${{ github.ref_name }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ------------- CONFIGURE GIT -------------
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
      
          # ------------- STAGE ALL CHANGES ---------
          # (Adjust the path as needed for each workflow – e.g., '.' or specific folders)
          git add .
      
          # ------------- NOTHING TO COMMIT? --------
          if git diff --staged --quiet; then
            echo "✅ No changes to commit."
            exit 0
          fi
      
          git commit -m "chore: update generated files [skip ci]"
      
          # ------------- AUTHENTICATED REMOTE ------
          REPO="${{ github.repository }}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
      
          # ------------- PUSH WITH RETRIES ---------
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "🚀 Push attempt $i of $RETRIES..."
            git pull --rebase --autostash origin "$BRANCH" || true
            if git push origin "$BRANCH"; then
              echo "✅ Push succeeded."
              break
            else
              echo "❌ Push failed."
              if [ $i -lt $RETRIES ]; then
                sleep 3
              else
                echo "::error::All push attempts failed. If this is a forked repository, the GITHUB_TOKEN does not have write permission. Use a Personal Access Token (PAT)."
                exit 1
              fi
            fi
          done
      
          # ------------- VERIFICATION ---------------
          echo "🔍 Verifying remote branch state..."
          git fetch origin "$BRANCH"
          if git diff --quiet "origin/$BRANCH" HEAD; then
            echo "✅ Remote branch matches local – push confirmed."
          else
            echo "❌ Remote branch differs from local. The push might have been rejected (common in forks)."
            echo "::error::Verification failed. Repository is a fork? GITHUB_TOKEN cannot write. Add a PAT secret."
            exit 1
          fi
